version: "3.9"

services:
  infrawatch:
    build: .
    ports:
      - "8080:8080"
    environment:
      - INFRAWATCH_LOG_LEVEL=INFO
    volumes:
      - ./sample_data:/app/sample_data:ro
      - infrawatch-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  infrawatch-data:
